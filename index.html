<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suman Kapri | IT Professional</title>
    
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== NAVIGATION (Glassmorphism) ===== -->
    <header>
        <nav>
            <div class="logo">Suman Kapri</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
            </ul>
        </nav>
    </header>

    <!-- ===== HERO SECTION (Animated Background + Typing) ===== -->
    <section class="hero">
        <!-- Floating gradient blobs (CSS art) -->
        <div class="floating-blob blob-1"></div>
        <div class="floating-blob blob-2"></div>
        
        <div class="hero-content">
            <!-- Profile Picture -->
            <img src="images/suman-profile.jpg" alt="Suman Kapri" />
            
            <!-- Name with Gradient -->
            <h1>Hi, I'm <span>Suman Kapri</span></h1>
            <p class="subtitle">Code. Network. Innovate.</p>
            
            
            
            <!-- Typing Animation (Starts with "Networks" visible) -->
            <div class="typing-wrapper">
                <span class="static-text">I build </span>
                <span class="dynamic-text">Networks</span>
            </div>
            
            <!-- Tech Tags -->
            <div class="tech-tags">
                <span>Java</span>
                <span>Python</span>
                <span>Networking</span>
                <span>UI/UX</span>
                <span>MySQL</span>
            </div>
            
            <!-- Glowing CTA Button -->
            <a href="projects.html" class="btn-glow">View My Work →</a>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2026 Suman Kapri</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
